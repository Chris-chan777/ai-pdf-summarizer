{% extends "base.html" %}

{% block title %}上传成功 - AI PDF Summarizer{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-10">
        <div class="card shadow-sm">
            <div class="card-body p-5">
                <h1 class="mb-4 text-center">上传成功</h1>
                <p class="text-muted mb-2">
                    原始文件名：{{ original_filename }}
                </p>
                <p class="text-muted mb-4">
                    保存后的文件名：{{ saved_filename }}
                </p>

                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2 class="h5 mb-0">提取的文本内容</h2>
                    <button
                        type="button"
                        id="copyTextButton"
                        class="btn btn-outline-primary btn-sm"
                        aria-live="polite"
                    >
                        复制文本
                    </button>
                </div>
                <div class="card bg-light mb-4">
                    <div class="card-body">
                        <pre id="extractedText" class="extracted-text mb-0">{{ extracted_text }}</pre>
                    </div>
                </div>

                <div class="text-center">
                    <a href="{{ url_for('main.index') }}" class="btn btn-primary">
                        返回首页
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
{% endblock %}
