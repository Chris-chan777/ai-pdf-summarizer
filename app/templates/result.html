{% extends "base.html" %}

{% block title %}上传成功 - AI PDF Summarizer{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-10">
        <div class="card shadow-sm">
            <div class="card-body p-5">
                <h1 class="mb-4 text-center">上传成功</h1>
                <p class="text-muted mb-4">文件名：{{ filename }}</p>

                <h2 class="h5 mb-3">提取的文本内容</h2>
                <div class="card bg-light mb-4">
                    <div class="card-body">
                        <pre class="mb-0 text-wrap">{{ extracted_text }}</pre>
                    </div>
                </div>

                <div class="text-center">
                    <a href="{{ url_for('main.index') }}" class="btn btn-primary">
                        返回首页
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
