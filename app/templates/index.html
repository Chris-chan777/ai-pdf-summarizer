{% extends "base.html" %}

{% block title %}AI PDF Summarizer - 上传 PDF{% endblock %}

{% block content %}

<h1 class="text-center mb-4">📄 上传 PDF 文件</h1>

<p class="text-center text-muted mb-4">
    选择一个 PDF 文件，我们将保存文件，并在下一阶段提取其中的文本内容。
</p>

<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">

        <div class="card shadow-sm">
            <div class="card-header fw-bold">
                选择文件
            </div>
            <div class="card-body">
                <form action="/upload" method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="pdfFile" class="form-label">请选择 PDF 文件</label>
                        <input
                            type="file"
                            class="form-control"
                            id="pdfFile"
                            name="pdf_file"
                            accept=".pdf"
                            required
                        >
                        <div class="form-text">
                            支持 PDF 格式，最大 16 MB。
                        </div>
                    </div>

                    <fieldset class="mb-4">
                        <legend class="h6 mb-3">
                            请选择要生成的复习资料类型
                        </legend>
                        <div class="row g-2">
                            {% for option in study_options %}
                                <div class="col-md-6">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox"
                                               name="study_options"
                                               id="studyOption{{ loop.index }}"
                                               value="{{ option.value }}"
                                               {% if option.default %}checked{% endif %}>
                                        <label class="form-check-label"
                                               for="studyOption{{ loop.index }}">
                                            {{ option.label }}
                                        </label>
                                    </div>
                                </div>
                            {% endfor %}
                        </div>
                    </fieldset>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            上传 PDF
                        </button>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>

{% endblock %}
