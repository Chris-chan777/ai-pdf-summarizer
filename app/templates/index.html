{% extends "base.html" %}

{% block title %}AI PDF Summarizer - 上传 PDF{% endblock %}

{% block content %}

<h1 class="text-center mb-4">📄 上传 PDF 文件</h1>

<p class="text-center text-muted mb-4">
    选择一个 PDF 文件，我们将保存文件，并在下一阶段提取其中的文本内容。
</p>

<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">

        <div class="card shadow-sm">
            <div class="card-header fw-bold">
                选择文件
            </div>
            <div class="card-body">
                <form action="/upload" method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="pdfFile" class="form-label">请选择 PDF 文件</label>
                        <input
                            type="file"
                            class="form-control"
                            id="pdfFile"
                            name="pdf_file"
                            accept=".pdf"
                            required
                        >
                        <div class="form-text">
                            支持 PDF 格式，最大 16 MB。
                        </div>
                    </div>

                    <fieldset class="mb-4">
                        <legend class="h6 mb-3">
                            请选择要生成的复习资料类型
                        </legend>
                        <div class="row g-2">
                            <div class="col-md-6">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox"
                                           name="study_options" id="coreSummary"
                                           value="核心知识点总结" checked>
                                    <label class="form-check-label" for="coreSummary">
                                        核心知识点总结
                                    </label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox"
                                           name="study_options" id="examFocus"
                                           value="考试重点整理" checked>
                                    <label class="form-check-label" for="examFocus">
                                        考试重点整理
                                    </label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox"
                                           name="study_options" id="conceptExplanation"
                                           value="名词解释 / 概念解释">
                                    <label class="form-check-label" for="conceptExplanation">
                                        名词解释 / 概念解释
                                    </label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox"
                                           name="study_options" id="multipleChoice"
                                           value="选择题练习">
                                    <label class="form-check-label" for="multipleChoice">
                                        选择题练习
                                    </label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox"
                                           name="study_options" id="shortAnswer"
                                           value="简答题练习">
                                    <label class="form-check-label" for="shortAnswer">
                                        简答题练习
                                    </label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox"
                                           name="study_options" id="quickReview"
                                           value="考前速记版">
                                    <label class="form-check-label" for="quickReview">
                                        考前速记版
                                    </label>
                                </div>
                            </div>
                        </div>
                    </fieldset>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            上传 PDF
                        </button>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>

{% endblock %}
