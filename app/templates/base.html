<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- ---------------------------------------------------- -->
    <!-- 字符编码：保证中文正常显示                           -->
    <!-- ---------------------------------------------------- -->
    <meta charset="UTF-8">

    <!-- ---------------------------------------------------- -->
    <!-- 视口设置：移动端响应式的关键                         -->
    <!-- ---------------------------------------------------- -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ---------------------------------------------------- -->
    <!-- 页面标题：子模板可通过 block title 覆盖           -->
    <!-- ---------------------------------------------------- -->
    <title>{% block title %}AI PDF Summarizer{% endblock %}</title>

    <!-- ---------------------------------------------------- -->
    <!-- Bootstrap 5 CSS（CDN 加速）                          -->
    <!-- ---------------------------------------------------- -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">

    <!-- ---------------------------------------------------- -->
    <!-- 自定义样式（全局加载）                                -->
    <!-- ---------------------------------------------------- -->
    <link href="{{ url_for('static', filename='css/style.css') }}"
          rel="stylesheet">

    <!-- ---------------------------------------------------- -->
    <!-- 预留自定义 CSS 位置：子模板在此注入额外样式          -->
    <!-- ---------------------------------------------------- -->
    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- ==================================================== -->
    <!-- 导航栏                                              -->
    <!-- ==================================================== -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <!-- 品牌标题 -->
            <a class="navbar-brand fw-bold" href="{{ url_for('main.index') }}">
                📄 AI PDF Summarizer
            </a>

            <!-- 移动端折叠按钮 -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNav" aria-controls="navbarNav"
                    aria-expanded="false" aria-label="切换导航">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- 导航链接区域 -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="{{ url_for('main.index') }}">首页</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ==================================================== -->
    <!-- 主内容区：子模板在此填充具体内容                    -->
    <!-- ==================================================== -->
    <main class="container my-4">
        {% block content %}
        <!-- 子模板如果不覆盖此 block，会显示以下默认文字 -->
        <p class="text-muted text-center">欢迎使用 AI PDF Summarizer。</p>
        {% endblock %}
    </main>

    <!-- ==================================================== -->
    <!-- 页脚（可选，所有页面统一展示）                      -->
    <!-- ==================================================== -->
    <footer class="text-center text-muted py-3 border-top mt-auto">
        <small>&copy; 2026 AI PDF Summarizer</small>
    </footer>

    <!-- ---------------------------------------------------- -->
    <!-- Bootstrap 5 JS Bundle（含 Popper，用于导航折叠等）   -->
    <!-- ---------------------------------------------------- -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous">
    </script>

    <!-- ---------------------------------------------------- -->
    <!-- 预留自定义 JS 位置：子模板在此注入脚本              -->
    <!-- ---------------------------------------------------- -->
    {% block extra_js %}{% endblock %}
</body>
</html>
